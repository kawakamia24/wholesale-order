<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗マスタ管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f4f6fb;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1e3a5f;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    header nav a {
      color: rgba(255,255,255,.75);
      text-decoration: none;
      font-size: 13px;
      margin-left: 16px;
    }
    header nav a:hover { color: #fff; }
    .logout-btn {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .logout-btn:hover { background: rgba(255,255,255,.25); }

    main { padding: 24px; max-width: 1000px; margin: 0 auto; }

    h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .field input:focus { border-color: #4f8ef7; }
    .field .hint { font-size: 11px; color: #aaa; margin-top: 4px; }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-danger  { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover  { background: #fecaca; }
    .btn-success { background: #d1fae5; color: #065f46; }
    .btn-success:hover { background: #a7f3d0; }

    .form-footer { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
    .form-msg { font-size: 13px; }
    .form-msg.ok  { color: #059669; }
    .form-msg.err { color: #dc2626; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8f9fc;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #e8e8e8;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    tbody td { padding: 11px 14px; font-size: 14px; vertical-align: middle; }

    .badge-active   { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; background:#d1fae5; color:#065f46; }
    .badge-inactive { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; background:#f3f4f6; color:#6b7280; }

    .slug { font-family: monospace; font-size: 13px; color: #555; }
    .empty { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }

    /* ログイン画面 */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .login-card h2 { font-size: 20px; margin-bottom: 24px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .login-field input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-error { color: #dc2626; font-size: 13px; margin-top: 10px; }

    #app { display: none; }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h2>管理者ログイン</h2>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 管理画面 -->
<div id="app">
  <header>
    <h1>📦 発注管理ダッシュボード</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <nav>
        <a href="index.html">発注一覧</a>
        <a href="stores.html">店舗マスタ</a>
        <a href="products.html">商品マスタ</a>
        <a href="../assets/qr-generator.html">QR生成</a>
      </nav>
      <button class="logout-btn" id="logout-btn">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 店舗追加フォーム -->
    <div class="card">
      <h2 id="form-title">店舗を追加</h2>
      <div class="form-grid">
        <div class="field">
          <label>店舗ID（スラッグ）*</label>
          <input type="text" id="f-id" placeholder="cafe-yamada">
          <div class="hint">英数字・ハイフンのみ。一度設定したら変更不可。QRコードのURLに使われます。</div>
        </div>
        <div class="field">
          <label>店舗名 *</label>
          <input type="text" id="f-name" placeholder="山田カフェ">
        </div>
        <div class="field full">
          <label>メールアドレス *</label>
          <input type="email" id="f-email" placeholder="yamada@example.com">
          <div class="hint">発注があったときにこのアドレスにも通知メールが届きます。</div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-primary" id="save-btn">保存する</button>
        <button class="btn" id="cancel-edit-btn" style="display:none;background:#f0f0f0;color:#333">キャンセル</button>
        <span class="form-msg" id="form-msg"></span>
      </div>
    </div>

    <!-- 店舗一覧 -->
    <div class="card">
      <h2>店舗一覧</h2>
      <table>
        <thead>
          <tr>
            <th>店舗ID</th>
            <th>店舗名</th>
            <th>メールアドレス</th>
            <th>状態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="stores-body">
          <tr><td colspan="5" class="empty">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL  = 'https://pwuhhdzomaojjvwmjizw.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3dWhoZHpvbWFvamp2d21qaXp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODUxNjksImV4cCI6MjA5MTg2MTE2OX0.3BaGea6Th9Z6k-KMkQFXC3wZWt8b1zqqLXlGPOecA-Y'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

  let editingId = null

  // ── 認証 ──────────────────────────────────────────────────
  async function checkAuth() {
    const { data: { session } } = await sb.auth.getSession()
    if (session) showApp()
    sb.auth.onAuthStateChange((_, session) => {
      if (session) showApp()
      else showLogin()
    })
  }

  function showApp() {
    document.getElementById('login-wrap').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    loadStores()
  }
  function showLogin() {
    document.getElementById('login-wrap').style.display = 'flex'
    document.getElementById('app').style.display = 'none'
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    const errEl    = document.getElementById('login-error')
    errEl.textContent = ''
    const { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) errEl.textContent = 'ログインに失敗しました。'
  })
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click()
  })
  document.getElementById('logout-btn').addEventListener('click', () => sb.auth.signOut())

  // ── 店舗一覧 ───────────────────────────────────────────────
  async function loadStores() {
    const { data, error } = await sb
      .from('stores')
      .select('*')
      .order('created_at', { ascending: false })

    const tbody = document.getElementById('stores-body')
    if (error || !data) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">読み込みに失敗しました</td></tr>`
      return
    }
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">店舗がありません</td></tr>`
      return
    }

    tbody.innerHTML = data.map(s => `
      <tr>
        <td><span class="slug">${s.id}</span></td>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>
          <span class="${s.active ? 'badge-active' : 'badge-inactive'}">
            ${s.active ? '有効' : '無効'}
          </span>
        </td>
        <td style="white-space:nowrap;display:flex;gap:6px">
          <button class="btn btn-sm btn-primary" onclick="startEdit('${s.id}')">編集</button>
          <button class="btn btn-sm ${s.active ? 'btn-danger' : 'btn-success'}"
            onclick="toggleActive('${s.id}', ${s.active})">
            ${s.active ? '無効化' : '有効化'}
          </button>
        </td>
      </tr>
    `).join('')
  }

  // ── 追加・編集 ─────────────────────────────────────────────
  document.getElementById('save-btn').addEventListener('click', async () => {
    const id    = document.getElementById('f-id').value.trim()
    const name  = document.getElementById('f-name').value.trim()
    const email = document.getElementById('f-email').value.trim()

    if (!id || !name || !email) {
      showMsg('* の項目をすべて入力してください', 'err')
      return
    }
    if (!/^[a-z0-9-]+$/.test(id)) {
      showMsg('店舗IDは英小文字・数字・ハイフンのみ使用できます', 'err')
      return
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMsg('メールアドレスの形式が正しくありません', 'err')
      return
    }

    const btn = document.getElementById('save-btn')
    btn.disabled = true

    let error
    if (editingId) {
      ;({ error } = await sb.from('stores').update({ name, email }).eq('id', editingId))
    } else {
      ;({ error } = await sb.from('stores').insert({ id, name, email }))
    }

    btn.disabled = false
    if (error) {
      showMsg(error.code === '23505' ? 'その店舗IDはすでに使われています' : '保存に失敗しました: ' + error.message, 'err')
      return
    }

    showMsg(editingId ? '更新しました' : '店舗を追加しました', 'ok')
    clearForm()
    loadStores()
  })

  function startEdit(id) {
    sb.from('stores').select('*').eq('id', id).single().then(({ data }) => {
      if (!data) return
      editingId = id
      document.getElementById('f-id').value    = data.id
      document.getElementById('f-id').disabled = true
      document.getElementById('f-name').value  = data.name
      document.getElementById('f-email').value = data.email
      document.getElementById('form-title').textContent = '店舗を編集'
      document.getElementById('cancel-edit-btn').style.display = 'inline-block'
      document.getElementById('form-msg').textContent = ''
      window.scrollTo({ top: 0, behavior: 'smooth' })
    })
  }

  document.getElementById('cancel-edit-btn').addEventListener('click', clearForm)

  function clearForm() {
    editingId = null
    document.getElementById('f-id').value    = ''
    document.getElementById('f-id').disabled = false
    document.getElementById('f-name').value  = ''
    document.getElementById('f-email').value = ''
    document.getElementById('form-title').textContent = '店舗を追加'
    document.getElementById('cancel-edit-btn').style.display = 'none'
    document.getElementById('form-msg').textContent = ''
  }

  async function toggleActive(id, currentActive) {
    const { error } = await sb.from('stores').update({ active: !currentActive }).eq('id', id)
    if (error) { alert('更新に失敗しました。'); return }
    loadStores()
  }

  function showMsg(text, type) {
    const el = document.getElementById('form-msg')
    el.textContent = text
    el.className = 'form-msg ' + type
  }

  checkAuth()
</script>
</body>
</html>
